<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Soundboard</title>

<style>

body{

margin:0;

background:black;

font-family:Arial;

color:white;

}

.top{

height:100px;

background:#95d59f;

display:flex;

align-items:center;

padding:15px;

gap:10px;

}

input{

display:none;

}

label{

background:black;

padding:14px;

border-radius:15px;

}

.add{

margin-left:auto;

width:70px;

height:70px;

font-size:40px;

border:none;

border-radius:20px;

background:#00853c;

color:white;

}

.stop{

width:60px;

height:60px;

border:none;

border-radius:18px;

}

#board{

padding:10px;

display:grid;

grid-template-columns:

repeat(3,1fr);

gap:14px;

}

.card{

height:130px;

background:#06100a;

border-radius:24px;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

transition:.2s;

}

.card.playing{

background:#00a13d;

}

.play{

width:100%;

height:100%;

background:none;

border:none;

color:white;

}

.icon{

font-size:40px;

margin-bottom:8px;

}

.name{

padding:8px;

}

</style>

</head>

<body>

<div class="top">

<label for="files">

📁 Tambah

</label>

<input
id="files"
multiple
accept="audio/*,.m4a,.mp4"
type="file">

<button
class="stop"

onclick="stopAll()">

⛔

</button>

<button
class="add"

onclick="addSounds()">

+

</button>

</div>

<div id="board"></div>

<script>

let sounds=[]

function addSounds(){

let files=[

...

document
.getElementById(
"files"
)
.files

]

files.forEach(f=>{

sounds.push({

name:

f.name.replace(

/\.[^/.]+$/,

""

),

url:

URL.createObjectURL(
f
),

audio:null,

playing:false

})

})

render()

}

function stopAll(){

sounds.forEach(s=>{

if(s.audio){

s.audio.pause()

s.audio.currentTime=0

s.playing=false

}

})

render()

}

function toggle(i){

let s=sounds[i]

if(!s.audio){

s.audio=

new Audio(
s.url
)

s.audio.onended=()=>{

s.playing=false

render()

}

}

if(

s.playing

){

s.audio.pause()

s.playing=false

}

else{

s.audio.play()

s.playing=true

}

render()

}

function renameSound(i){

let n=

prompt(

"Ganti nama",

sounds[i].name

)

if(!n)return

sounds[i].name=n

render()

}

function removeSound(i){

if(

confirm(

"Hapus sound?"

)

){

if(
sounds[i]
.audio
){

sounds[i]
.audio
.pause()

}

sounds.splice(

i,

1

)

render()

}

}

function render(){

board.innerHTML=""

sounds.forEach((s,i)=>{

let card=

document
.createElement(
"div"
)

card.className=

"card"

+

(

s.playing

?

" playing"

:

""

)

card.innerHTML=`

<button class="play">

<div class="icon">

${
s.playing

?

"⏸"

:

"▶"

}

</div>

<div class="name">

${s.name}

</div>

</button>

`

card.onclick=()=>{

toggle(i)

}

let timer

card.ontouchstart=()=>{

timer=

setTimeout(

()=>{

renameSound(i)

},

700

)

}

card.ontouchend=()=>{

clearTimeout(
timer
)

}

card.ondblclick=()=>{

removeSound(i)

}

board.append(
card
)

})

}

render()

</script>

</body>

</html>
